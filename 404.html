<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🔐 چبیگیم | چت امن گروهی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, system-ui, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .chat-container {
            max-width: 550px;
            width: 100%;
            height: 95vh;
            background: #1a1a2e;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            color: white;
            padding: 16px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .online-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .user-badge {
            font-size: 0.65rem;
            background: rgba(255,255,255,0.15);
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 6px;
            display: inline-block;
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .login-box {
            background: #1a1a2e;
            padding: 30px 25px;
            border-radius: 32px;
            text-align: center;
            width: 320px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .login-box h3 {
            color: white;
            margin-bottom: 8px;
            font-size: 1.4rem;
        }

        .login-box .sub {
            color: #a78bfa;
            font-size: 0.75rem;
            margin-bottom: 25px;
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            border-radius: 28px;
            border: none;
            margin-bottom: 15px;
            text-align: center;
            font-size: 16px;
            background: #2d2d44;
            color: white;
            outline: none;
        }

        .login-box button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 28px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .login-error {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 12px;
        }

        .status-bar {
            padding: 6px 12px;
            font-size: 0.65rem;
            background: #16213e;
            color: #a0a0a0;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #2a2a4a;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #0f0f1a;
        }

        .message {
            max-width: 85%;
            animation: messageSlideIn 0.25s ease;
        }

        @keyframes messageSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-own {
            align-self: flex-end;
        }

        .message-other {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 8px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .message-own .message-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-other .message-bubble {
            background: #2d2d44;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        /* ریپلای استایل مثل تلگرام */
        .reply-preview {
            font-size: 0.7rem;
            padding: 6px 10px;
            margin-bottom: 6px;
            border-radius: 14px;
            background: rgba(255,255,255,0.08);
            border-right: 3px solid #a78bfa;
        }

        .message-own .reply-preview {
            border-right-color: #c4b5fd;
        }

        .reply-preview-sender {
            color: #a78bfa;
            font-weight: bold;
        }

        .reply-preview-text {
            color: #aaa;
            font-size: 0.65rem;
            margin-top: 2px;
        }

        .message-sender {
            font-size: 0.6rem;
            font-weight: bold;
            margin-bottom: 3px;
            padding: 0 4px;
        }

        .message-own .message-sender {
            color: #c4b5fd;
            text-align: right;
        }

        .message-other .message-sender {
            color: #a78bfa;
            text-align: left;
        }

        .message-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 3px;
            padding: 0 4px;
        }

        .message-time {
            font-size: 0.5rem;
            color: #6b6b8a;
        }

        .reply-btn {
            background: none;
            border: none;
            color: #6b6b8a;
            font-size: 0.6rem;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 16px;
            transition: 0.2s;
        }

        .reply-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #a78bfa;
        }

        .typing-indicator {
            padding: 6px 12px;
            font-size: 0.65rem;
            color: #6b6b8a;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .input-area {
            padding: 12px;
            background: #1a1a2e;
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-direction: row;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #2a2a4a;
            border-radius: 28px;
            font-size: 0.9rem;
            outline: none;
            background: #2d2d44;
            color: white;
            order: 2;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            order: 1;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-icon {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .messages-area::-webkit-scrollbar {
            width: 3px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #2a2a4a;
            border-radius: 3px;
        }

        .notification {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2d44;
            color: white;
            padding: 6px 14px;
            border-radius: 28px;
            font-size: 0.7rem;
            z-index: 1000;
            animation: fadeUp 0.3s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .reply-bar {
            background: #16213e;
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            border-top: 1px solid #2a2a4a;
        }

        .reply-cancel {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div class="chat-container" id="chatApp" style="display: none;">
    <div class="chat-header">
        <h1>
            🔐 چبیگیم
            <span class="online-dot"></span>
        </h1>
        <div class="user-badge" id="userBadge">👤 در حال بارگذاری...</div>
    </div>

    <div class="status-bar" id="statusDiv">
        <span>🔒</span> در حال اتصال...
    </div>

    <div class="messages-area" id="messagesArea"></div>

    <div class="typing-indicator" id="typingIndicator" style="display: none;">
        <span>✏️</span> <span>یکی در حال تایپ است</span> <span>...</span>
    </div>

    <div id="replyBar" class="reply-bar" style="display: none;">
        <span>💬 پاسخ به <span id="replyText"></span></span>
        <button class="reply-cancel" id="cancelReply">لغو</button>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="پیامت رو بنویس..." disabled>
        <button class="send-btn" id="sendBtn" disabled>
            <svg class="send-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
</div>

<script>
    (function() {
        // ==================== تنظیمات خودکار ====================
        const CHAT_PASSWORD = "chibegim";
        const ENCRYPTION_KEY = "moomenSARAIE";
        
        // ===== تغییر ۱: آدرس Worker خودت رو اینجا بذار =====
        const WORKER_URL = "https://your-worker.workers.dev"; // ← آدرس ورکرت رو بذار
        
        const OWNER = "AliJayZ";
        const REPO = "chibegim";
        const FILE_PATH = "messages.txt";
        
        const STORAGE_KEY = "chibegim_logged_in";
        const USERNAME_KEY = "chibegim_username";
        
        let MY_USERNAME = localStorage.getItem(USERNAME_KEY) || "";
        let currentFileSha = null;
        let lastMessagesHash = "";
        let autoRefreshInterval = null;
        let typingTimeout = null;
        let replyTo = null;
        
        // ==================== توابع رمزنگاری ====================
        function strToBuffer(str) {
            return new TextEncoder().encode(str);
        }
        
        function bufferToStr(buffer) {
            return new TextDecoder('utf-8').decode(buffer);
        }
        
        function bufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.length; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }
        
        function base64ToBuffer(base64) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes.buffer;
        }
        
        async function deriveKey(password, salt) {
            const encoder = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                'raw',
                encoder.encode(password),
                'PBKDF2',
                false,
                ['deriveKey']
            );
            return await crypto.subtle.deriveKey(
                {
                    name: 'PBKDF2',
                    salt: salt,
                    iterations: 50000,
                    hash: 'SHA-256'
                },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['encrypt', 'decrypt']
            );
        }
        
        async function encryptMessage(message, password) {
            const salt = new TextEncoder().encode('chibegim-salt');
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const key = await deriveKey(password, salt);
            const encrypted = await crypto.subtle.encrypt(
                { name: 'AES-GCM', iv: iv, tagLength: 128 },
                key,
                strToBuffer(message)
            );
            const combined = new Uint8Array(iv.length + encrypted.byteLength);
            combined.set(iv, 0);
            combined.set(new Uint8Array(encrypted), iv.length);
            return bufferToBase64(combined);
        }
        
        async function decryptMessage(encryptedBase64, password) {
            try {
                const salt = new TextEncoder().encode('chibegim-salt');
                const combined = new Uint8Array(base64ToBuffer(encryptedBase64));
                const iv = combined.slice(0, 12);
                const encryptedData = combined.slice(12);
                const key = await deriveKey(password, salt);
                const decrypted = await crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv: iv, tagLength: 128 },
                    key,
                    encryptedData
                );
                return bufferToStr(decrypted);
            } catch(e) {
                return null;
            }
        }
        
        // ==================== توابع کمکی ====================
        function utf8ToBase64(str) {
            const utf8Bytes = new TextEncoder().encode(str);
            let binary = '';
            for (let i = 0; i < utf8Bytes.length; i++) {
                binary += String.fromCharCode(utf8Bytes[i]);
            }
            return btoa(binary);
        }
        
        function base64ToUtf8(base64) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return new TextDecoder('utf-8').decode(bytes);
        }
        
        function getGregorianTimestamp() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        }
        
        // ==================== گیت‌هاب از طریق Worker ====================
        async function fetchMessages() {
            // ===== تغییر ۲: آدرس به Worker تغییر کرد =====
            const url = `${WORKER_URL}/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
            try {
                const response = await fetch(url, {
                    headers: {
                        // ===== تغییر ۳: هدر Authorization حذف شد =====
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                if(response.status === 404) return "";
                if(!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                currentFileSha = data.sha;
                return base64ToUtf8(data.content);
            } catch(error) {
                return null;
            }
        }
        
        async function sendMessageToGithub(messageText) {
            if(!messageText.trim()) return false;
            
            const currentContent = await fetchMessages();
            if(currentContent === null) return false;
            
            let finalMessage = messageText.trim();
            let replyData = null;
            
            if (replyTo) {
                replyData = { sender: replyTo.sender, text: replyTo.text };
                finalMessage = `REPLY:${replyTo.sender}:${replyTo.text}\n${finalMessage}`;
                replyTo = null;
                document.getElementById('replyBar').style.display = 'none';
            }
            
            const encryptedMessage = await encryptMessage(finalMessage, ENCRYPTION_KEY);
            if(!encryptedMessage) return false;
            
            const timestamp = getGregorianTimestamp();
            const newMessageLine = `[${timestamp}] [${MY_USERNAME}] 🔐${encryptedMessage}\n`;
            const newContent = currentContent + newMessageLine;
            const contentBase64 = utf8ToBase64(newContent);
            
            // ===== تغییر ۴: آدرس به Worker تغییر کرد =====
            const url = `${WORKER_URL}/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
            
            try {
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        // ===== تغییر ۵: هدر Authorization حذف شد =====
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `پیام از ${MY_USERNAME}`,
                        content: contentBase64,
                        sha: currentFileSha
                    })
                });
                if(!response.ok) throw new Error('ارسال نشد');
                return true;
            } catch(error) {
                return false;
            }
        }
        
        // ==================== نمایش پیام‌ها ====================
        let messagesCache = [];
        
        function extractReplyInfo(text) {
            if (text.startsWith('REPLY:')) {
                const firstLineEnd = text.indexOf('\n');
                if (firstLineEnd !== -1) {
                    const replyLine = text.substring(0, firstLineEnd);
                    const parts = replyLine.split(':');
                    if (parts.length >= 3) {
                        const replySender = parts[1];
                        const replyText = parts.slice(2).join(':');
                        const mainText = text.substring(firstLineEnd + 1);
                        return { replySender, replyText, mainText };
                    }
                }
            }
            return null;
        }
        
        async function updateMessages() {
            const content = await fetchMessages();
            if(content === null) return;
            
            const lines = content.split('\n').filter(l => l.trim());
            const newMessages = [];
            
            for(const line of lines) {
                const match = line.match(/\[(.*?)\]\s*\[(.*?)\]\s*🔐(.*)/);
                if(match) {
                    const time = match[1];
                    const sender = match[2];
                    const encrypted = match[3];
                    let decrypted = await decryptMessage(encrypted, ENCRYPTION_KEY);
                    if(decrypted === null) decrypted = '⚠️ [خطا]';
                    
                    const replyInfo = extractReplyInfo(decrypted);
                    let displayText = decrypted;
                    let replyData = null;
                    
                    if (replyInfo) {
                        replyData = { sender: replyInfo.replySender, text: replyInfo.replyText };
                        displayText = replyInfo.mainText;
                    }
                    
                    newMessages.push({ time, sender, text: displayText, replyTo: replyData });
                }
            }
            
            const newHash = JSON.stringify(newMessages);
            if (newHash !== lastMessagesHash) {
                renderAllMessages(newMessages);
                messagesCache = newMessages;
                lastMessagesHash = newHash;
                scrollToBottom();
            }
        }
        
        function renderAllMessages(messages) {
            const container = document.getElementById('messagesArea');
            container.innerHTML = '';
            messages.forEach(msg => appendMessageToDOM(msg));
        }
        
        function appendMessageToDOM(msg) {
            const isOwn = (msg.sender === MY_USERNAME);
            const messageClass = isOwn ? 'message-own' : 'message-other';
            
            let replyHtml = '';
            if (msg.replyTo) {
                replyHtml = `
                    <div class="reply-preview">
                        <div class="reply-preview-sender">${escapeHtml(msg.replyTo.sender)}</div>
                        <div class="reply-preview-text">${escapeHtml(msg.replyTo.text.substring(0, 60))}</div>
                    </div>
                `;
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${messageClass}`;
            messageDiv.innerHTML = `
                <div class="message-sender">👤 ${escapeHtml(msg.sender)}</div>
                ${replyHtml}
                <div class="message-bubble">${escapeHtml(msg.text)}</div>
                <div class="message-footer">
                    <span class="message-time">🕒 ${escapeHtml(msg.time)}</span>
                    <button class="reply-btn" data-sender="${escapeHtml(msg.sender)}" data-text="${escapeHtml(msg.text)}">💬 پاسخ</button>
                </div>
            `;
            
            const replyBtn = messageDiv.querySelector('.reply-btn');
            replyBtn.onclick = () => {
                replyTo = { sender: msg.sender, text: msg.text };
                const replyBar = document.getElementById('replyBar');
                document.getElementById('replyText').innerHTML = `${msg.sender}: "${msg.text.substring(0, 40)}"`;
                replyBar.style.display = 'flex';
                document.getElementById('messageInput').focus();
            };
            
            document.getElementById('messagesArea').appendChild(messageDiv);
        }
        
        function scrollToBottom() {
            const area = document.getElementById('messagesArea');
            setTimeout(() => {
                area.scrollTop = area.scrollHeight;
            }, 50);
        }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const msg = input.value.trim();
            if(!msg) return;
            
            input.disabled = true;
            const success = await sendMessageToGithub(msg);
            input.disabled = false;
            
            if(success) {
                input.value = '';
                await updateMessages();
                showNotification('✓ ارسال شد');
            } else {
                showNotification('❌ ارسال نشد!');
            }
            input.focus();
        }
        
        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.innerText = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }
        
        // ==================== صفحه ورود ====================
        function showLoginScreen() {
            return new Promise((resolve) => {
                const loginDiv = document.createElement('div');
                loginDiv.className = 'login-overlay';
                loginDiv.innerHTML = `
                    <div class="login-box">
                        <h3>🔐 چبیگیم</h3>
                        <div class="sub">چت امن گروهی</div>
                        <input type="password" id="chatPassword" placeholder="رمز چت را وارد کن" autocomplete="off">
                        <button id="submitPassword">ورود</button>
                        <div id="loginError" class="login-error"></div>
                    </div>
                `;
                document.body.appendChild(loginDiv);
                
                const passwordInput = document.getElementById('chatPassword');
                const submitBtn = document.getElementById('submitPassword');
                const loginError = document.getElementById('loginError');
                
                function checkPassword() {
                    if(passwordInput.value.trim() === CHAT_PASSWORD) {
                        localStorage.setItem(STORAGE_KEY, "true");
                        loginDiv.remove();
                        resolve();
                    } else {
                        loginError.innerText = '❌ رمز اشتباه است! رمز: chibegim';
                        passwordInput.value = '';
                        passwordInput.focus();
                    }
                }
                
                submitBtn.onclick = checkPassword;
                passwordInput.onkeypress = (e) => { if(e.key === 'Enter') checkPassword(); };
                passwordInput.focus();
            });
        }
        
        function askForUsername() {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'login-overlay';
                overlay.innerHTML = `
                    <div class="login-box">
                        <h3>👤 نام کاربری</h3>
                        <div class="sub">چطور در چت دیده شوی؟</div>
                        <input type="text" id="usernameInput" placeholder="نام خود را وارد کن" autocomplete="off">
                        <button id="submitUsername">ثبت و ادامه</button>
                        <div id="usernameError" class="login-error"></div>
                    </div>
                `;
                document.body.appendChild(overlay);
                
                const usernameInput = document.getElementById('usernameInput');
                const submitBtn = document.getElementById('submitUsername');
                const usernameError = document.getElementById('usernameError');
                
                function saveUsername() {
                    const username = usernameInput.value.trim();
                    if(!username) {
                        usernameError.innerText = '❌ لطفاً نام کاربری وارد کن!';
                        return;
                    }
                    if(username.length > 25) {
                        usernameError.innerText = '❌ حداکثر 25 کاراکتر';
                        return;
                    }
                    MY_USERNAME = username;
                    localStorage.setItem(USERNAME_KEY, MY_USERNAME);
                    document.getElementById('userBadge').innerHTML = `👤 ${MY_USERNAME}`;
                    overlay.remove();
                    resolve();
                }
                
                submitBtn.onclick = saveUsername;
                usernameInput.onkeypress = (e) => { if(e.key === 'Enter') saveUsername(); };
                usernameInput.focus();
            });
        }
        
        // ==================== راه‌اندازی ====================
        async function init() {
            const isLoggedIn = localStorage.getItem(STORAGE_KEY) === "true";
            if (!isLoggedIn) await showLoginScreen();
            
            if (!MY_USERNAME) await askForUsername();
            else document.getElementById('userBadge').innerHTML = `👤 ${MY_USERNAME}`;
            
            document.getElementById('chatApp').style.display = 'flex';
            document.getElementById('statusDiv').innerHTML = '✅ متصل به گیت‌هاب';
            
            const msgInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            msgInput.disabled = false;
            sendBtn.disabled = false;
            
            await updateMessages();
            
            if(autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(() => {
                updateMessages();
            }, 4000);
            
            msgInput.addEventListener('input', () => {
                const typing = document.getElementById('typingIndicator');
                typing.style.display = 'flex';
                if(typingTimeout) clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    typing.style.display = 'none';
                }, 1000);
            });
            
            sendBtn.onclick = sendMessage;
            msgInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
            
            document.getElementById('cancelReply').onclick = () => {
                replyTo = null;
                document.getElementById('replyBar').style.display = 'none';
            };
        }
        
        init();
    })();
</script>
</body>
</html>
